version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: playlistbridge-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: playlistbridge

volumes:
  mongodb_data:
    driver: local