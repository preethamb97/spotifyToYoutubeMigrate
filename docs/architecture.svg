<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 2L8 5L2 8" fill="none" stroke="#d97706" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f9fafb" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">PlaylistBridge — System Architecture</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#6b7280">Spotify → YouTube playlist migration · Node.js · React · MongoDB</text>

  <!-- ═══════════════════════ USER ZONE ═══════════════════════ -->
  <rect x="16" y="72" width="180" height="110" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="106" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">👤 USER BROWSER</text>
  <rect x="30" y="102" width="152" height="32" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="106" y="121" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">React Frontend</text>
  <rect x="30" y="142" width="152" height="28" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="106" y="160" text-anchor="middle" font-size="10" fill="#1d4ed8">Vite · TailwindCSS</text>

  <!-- ═══════════════════════ BACKEND CORE ═══════════════════════ -->
  <rect x="280" y="72" width="340" height="200" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">⚙️  NODE.JS BACKEND (Express)</text>

  <!-- Auth module -->
  <rect x="296" y="103" width="145" height="52" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="368" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Auth Routes</text>
  <text x="368" y="136" text-anchor="middle" font-size="9" fill="#166534">Google OAuth · Spotify OAuth</text>
  <text x="368" y="148" text-anchor="middle" font-size="9" fill="#166534">passport.js · express-session</text>

  <!-- API Routes -->
  <rect x="449" y="103" width="155" height="52" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="526" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">API Routes</text>
  <text x="526" y="136" text-anchor="middle" font-size="9" fill="#166534">/spotify · /youtube</text>
  <text x="526" y="148" text-anchor="middle" font-size="9" fill="#166534">/migrate · /export</text>

  <!-- Services row -->
  <rect x="296" y="167" width="90" height="90" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="341" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Spotify</text>
  <text x="341" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Service</text>
  <text x="341" y="211" text-anchor="middle" font-size="9" fill="#166534">fetch playlists</text>
  <text x="341" y="224" text-anchor="middle" font-size="9" fill="#166534">fetch tracks</text>
  <text x="341" y="237" text-anchor="middle" font-size="9" fill="#166534">token refresh</text>
  <text x="341" y="250" text-anchor="middle" font-size="9" fill="#166534">paginate API</text>

  <rect x="394" y="167" width="90" height="90" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="439" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">YouTube</text>
  <text x="439" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">Service</text>
  <text x="439" y="211" text-anchor="middle" font-size="9" fill="#166534">create playlist</text>
  <text x="439" y="224" text-anchor="middle" font-size="9" fill="#166534">add video</text>
  <text x="439" y="237" text-anchor="middle" font-size="9" fill="#166534">user OAuth token</text>
  <text x="439" y="250" text-anchor="middle" font-size="9" fill="#166534">own quota only</text>

  <rect x="492" y="167" width="112" height="90" rx="7" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
  <text x="548" y="184" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Migration</text>
  <text x="548" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Worker</text>
  <text x="548" y="211" text-anchor="middle" font-size="9" fill="#92400e">async fire &amp; forget</text>
  <text x="548" y="224" text-anchor="middle" font-size="9" fill="#92400e">500ms delay/insert</text>
  <text x="548" y="237" text-anchor="middle" font-size="9" fill="#92400e">live job progress</text>
  <text x="548" y="250" text-anchor="middle" font-size="9" fill="#92400e">track results log</text>

  <!-- ═══════════════════════ FREE SEARCH ENGINE ═══════════════════════ -->
  <rect x="280" y="288" width="340" height="108" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="308" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">🔍 FREE SEARCH SERVICE (No API Key)</text>

  <rect x="296" y="318" width="148" height="66" rx="7" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="370" y="337" text-anchor="middle" font-size="10" font-weight="700" fill="#78350f">ytsr (primary)</text>
  <text x="370" y="351" text-anchor="middle" font-size="9" fill="#78350f">npm · scrapes YouTube</text>
  <text x="370" y="364" text-anchor="middle" font-size="9" fill="#78350f">no API key needed</text>
  <text x="370" y="377" text-anchor="middle" font-size="9" fill="#78350f">server IP only</text>

  <rect x="456" y="318" width="148" height="66" rx="7" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="530" y="337" text-anchor="middle" font-size="10" font-weight="700" fill="#78350f">Invidious (fallback)</text>
  <text x="530" y="351" text-anchor="middle" font-size="9" fill="#78350f">public API instances</text>
  <text x="530" y="364" text-anchor="middle" font-size="9" fill="#78350f">fdn.fr · nadeko.net</text>
  <text x="530" y="377" text-anchor="middle" font-size="9" fill="#78350f">privacyredirect.com</text>

  <!-- ═══════════════════════ MONGODB ═══════════════════════ -->
  <rect x="660" y="72" width="222" height="324" rx="10" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="771" y="93" text-anchor="middle" font-size="11" font-weight="700" fill="#7e22ce">🗄️  MONGODB</text>

  <rect x="675" y="103" width="192" height="64" rx="7" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="771" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="#6b21a8">User</text>
  <text x="771" y="136" text-anchor="middle" font-size="9" fill="#6b21a8">googleId · spotifyId</text>
  <text x="771" y="149" text-anchor="middle" font-size="9" fill="#6b21a8">accessToken · refreshToken</text>
  <text x="771" y="162" text-anchor="middle" font-size="9" fill="#6b21a8">tokenExpiry · avatar</text>

  <rect x="675" y="177" width="192" height="78" rx="7" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="771" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#6b21a8">MigrationJob</text>
  <text x="771" y="210" text-anchor="middle" font-size="9" fill="#6b21a8">status: pending|running|done|failed</text>
  <text x="771" y="223" text-anchor="middle" font-size="9" fill="#6b21a8">totalTracks · processedTracks</text>
  <text x="771" y="236" text-anchor="middle" font-size="9" fill="#6b21a8">trackResults[] per song</text>
  <text x="771" y="249" text-anchor="middle" font-size="9" fill="#6b21a8">userId ref · timestamps</text>

  <rect x="675" y="265" width="192" height="78" rx="7" fill="#fce7f3" stroke="#fbcfe8" stroke-width="1"/>
  <text x="771" y="284" text-anchor="middle" font-size="10" font-weight="700" fill="#9d174d">VideoCache ⚡</text>
  <text x="771" y="298" text-anchor="middle" font-size="9" fill="#9d174d">cacheKey: artist__title</text>
  <text x="771" y="311" text-anchor="middle" font-size="9" fill="#9d174d">youtubeVideoId (shared)</text>
  <text x="771" y="324" text-anchor="middle" font-size="9" fill="#9d174d">global across all users</text>
  <text x="771" y="337" text-anchor="middle" font-size="9" fill="#9d174d">zero re-search ever</text>

  <rect x="675" y="353" width="192" height="35" rx="7" fill="#f3e8ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="771" y="368" text-anchor="middle" font-size="10" font-weight="700" fill="#6b21a8">Sessions (connect-mongo)</text>
  <text x="771" y="381" text-anchor="middle" font-size="9" fill="#6b21a8">persistent · no Redis needed</text>

  <!-- ═══════════════════════ EXTERNAL APIs ═══════════════════════ -->
  <rect x="16" y="288" width="246" height="104" rx="10" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="139" y="308" text-anchor="middle" font-size="11" font-weight="700" fill="#be123c">🌐 EXTERNAL APIs</text>

  <rect x="28" y="318" width="104" height="62" rx="7" fill="#ffe4e6" stroke="#fda4af" stroke-width="1"/>
  <text x="80" y="337" text-anchor="middle" font-size="10" font-weight="700" fill="#9f1239">Spotify API</text>
  <text x="80" y="351" text-anchor="middle" font-size="9" fill="#9f1239">api.spotify.com/v1</text>
  <text x="80" y="364" text-anchor="middle" font-size="9" fill="#9f1239">read-only · free</text>
  <text x="80" y="377" text-anchor="middle" font-size="9" fill="#9f1239">user OAuth token</text>

  <rect x="142" y="318" width="110" height="62" rx="7" fill="#ffe4e6" stroke="#fda4af" stroke-width="1"/>
  <text x="197" y="337" text-anchor="middle" font-size="10" font-weight="700" fill="#9f1239">YouTube API</text>
  <text x="197" y="351" text-anchor="middle" font-size="9" fill="#9f1239">googleapis.com/v3</text>
  <text x="197" y="364" text-anchor="middle" font-size="9" fill="#9f1239">insert only · 50u/call</text>
  <text x="197" y="377" text-anchor="middle" font-size="9" fill="#9f1239">10k units/user/day</text>

  <!-- ═══════════════════════ EXPORT ZONE ═══════════════════════ -->
  <rect x="16" y="412" width="246" height="90" rx="10" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="139" y="432" text-anchor="middle" font-size="11" font-weight="700" fill="#0f766e">📥 EXPORT MODULE</text>
  <rect x="28" y="442" width="104" height="48" rx="7" fill="#ccfbf1" stroke="#5eead4" stroke-width="1"/>
  <text x="80" y="461" text-anchor="middle" font-size="10" font-weight="700" fill="#115e59">CSV Export</text>
  <text x="80" y="475" text-anchor="middle" font-size="9" fill="#115e59">Title · Artist · Album</text>
  <text x="80" y="488" text-anchor="middle" font-size="9" fill="#115e59">Content-Disposition DL</text>
  <rect x="142" y="442" width="110" height="48" rx="7" fill="#ccfbf1" stroke="#5eead4" stroke-width="1"/>
  <text x="197" y="461" text-anchor="middle" font-size="10" font-weight="700" fill="#115e59">JSON Export</text>
  <text x="197" y="475" text-anchor="middle" font-size="9" fill="#115e59">Full playlist data</text>
  <text x="197" y="488" text-anchor="middle" font-size="9" fill="#115e59">Migration results</text>

  <!-- ═══════════════════════ ARROWS ═══════════════════════ -->
  <!-- Browser → Backend -->
  <line x1="196" y1="120" x2="278" y2="120" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="237" y="113" text-anchor="middle" font-size="9" fill="#2563eb">REST/poll</text>

  <!-- Backend → MongoDB -->
  <line x1="622" y1="200" x2="658" y2="200" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="640" y="193" text-anchor="middle" font-size="9" fill="#7c3aed">CRUD</text>

  <!-- Backend → Search -->
  <line x1="450" y1="272" x2="450" y2="286" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Backend → Spotify API -->
  <line x1="340" y1="272" x2="160" y2="316" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>

  <!-- Backend → YouTube API -->
  <line x1="440" y1="272" x2="220" y2="316" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-red)"/>

  <!-- Search → MongoDB (cache) -->
  <line x1="622" y1="340" x2="658" y2="320" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-amber)"/>
  <text x="645" y="325" text-anchor="middle" font-size="9" fill="#d97706">cache</text>

  <!-- Backend → Export -->
  <line x1="340" y1="272" x2="139" y2="410" stroke="#0f766e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════ LEGEND ═══════════════════════ -->
  <rect x="280" y="416" width="360" height="88" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="460" y="434" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">LEGEND</text>
  <line x1="296" y1="447" x2="336" y2="447" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="343" y="451" font-size="9" fill="#374151">Browser ↔ Backend (REST, polling SSE)</text>
  <line x1="296" y1="462" x2="336" y2="462" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="343" y="466" font-size="9" fill="#374151">Backend → External API (user OAuth token)</text>
  <line x1="296" y1="477" x2="336" y2="477" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="343" y="481" font-size="9" fill="#374151">Free search path (no API key · ytsr · Invidious)</text>
  <line x1="296" y1="492" x2="336" y2="492" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="343" y="496" font-size="9" fill="#374151">Database operations (Mongoose ODM)</text>

  <!-- ═══════════════════════ QUOTA CALLOUT ═══════════════════════ -->
  <rect x="660" y="406" width="222" height="96" rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="771" y="424" text-anchor="middle" font-size="10" font-weight="700" fill="#713f12">⚡ QUOTA STRATEGY</text>
  <text x="771" y="440" text-anchor="middle" font-size="9" fill="#713f12">Search: 0 quota (ytsr scrape)</text>
  <text x="771" y="454" text-anchor="middle" font-size="9" fill="#713f12">Insert: 50 units per video</text>
  <text x="771" y="468" text-anchor="middle" font-size="9" fill="#713f12">Each user: 10k units/day</text>
  <text x="771" y="482" text-anchor="middle" font-size="9" fill="#713f12">= ~200 songs/user/day</text>
  <text x="771" y="496" text-anchor="middle" font-size="9" fill="#713f12">Cache: never re-search same track</text>

  <!-- Footer -->
  <text x="450" y="524" text-anchor="middle" font-size="10" fill="#9ca3af">PlaylistBridge · MIT License · github.com/yourname/playlistbridge</text>
</svg>
